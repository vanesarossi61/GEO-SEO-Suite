repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [typer>=0.9.0, pydantic>=2.0, pydantic-settings>=2.0, rich>=13.0, types-PyYAML]
        args: [--strict]
        pass_filenames: false
        entry: mypy geo_seo
