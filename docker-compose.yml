version: "3.9"
services:
  app:
    build: { context: ., dockerfile: Dockerfile }
    container_name: geo-seo-app
    ports: ["8000:8000"]
    volumes: ["./config:/app/config:ro"]
    environment:
      - GEO_SEO_DB_URL=sqlite+aiosqlite:///app/data/geo-seo.db
      - GEO_SEO_LOG_LEVEL=INFO
    restart: unless-stopped
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
